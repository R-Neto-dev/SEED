<!DOCTYPE html>

    <head>

        <link rel="stylesheet" href="log-cad.css">

    <body>

        <div class="container">

                <button class="btn">Acessar</button>

                <div class="link">

                </div>

                <div class="icons">
                    <div class="icon">G</div>
                    <div class="icon">@</div>

            </div>

            <div class="right">
                <img src="img/logo.jpeg" alt="logo secretaria do estado de Sergipe">

                <h2 style="margin-top: 30px;">
                    Onde tem estudo tem o<br>
                    futuro se transformando
                </h2>
            </div>

        </div>

</html>
