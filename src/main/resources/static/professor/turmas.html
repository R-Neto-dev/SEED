<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Turmas | Professor</title>

  <!-- Boxicons -->
  <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" />

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo-area">
        <div class="logo-icon">PS</div>

        <div class="logo-text-wrapper">
          <span class="logo-text">Prova Sergipe</span>
          <span class="logo-subtitle">Professor</span>
        </div>
      </div>

      <nav class="nav">
        <a href="index.html" class="nav-item">
          <i class="bx bx-home"></i>
          <span>Dashboard</span>
        </a>

        <a href="provas.html" class="nav-item">
          <i class="bx bx-book-open"></i>
          <span>Provas</span>
        </a>

        <a href="turmas.html" class="nav-item active">
          <i class="bx bx-group"></i>
          <span>Turmas</span>
        </a>

        <a href="#" class="nav-item">
          <i class="bx bx-library"></i>
          <span>Banco de Questões</span>
        </a>

        <a href="resultados.html" class="nav-item">
          <i class="bx bx-line-chart"></i>
          <span>Resultados</span>
        </a>

        <a href="#" class="nav-item">
          <i class="bx bx-calendar-event"></i>
          <span>Calendário</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="#" class="nav-item">
          <i class="bx bx-cog"></i>
          <span>Configurações</span>
        </a>

        <a href="#" class="nav-item" id="logout">
          <i class="bx bx-log-out-circle"></i>
          <span>Sair</span>
        </a>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <!-- HEADER -->
      <header class="header">
        <div class="header-left">
          <button class="menu-btn" id="menuBtn">
            <i class="bx bx-menu"></i>
          </button>
        </div>

        <div class="header-right">
          <!-- Notificação -->
          <button class="notification-btn">
            <i class="bx bx-bell"></i>
            <span class="notification-badge">3</span>
          </button>

          <!-- Usuário -->
          <div class="user">
            <div class="user-avatar">P</div>

            <div class="user-details">
              <div class="user-name">Paula Santos</div>
              <div class="user-role">Professor - Matemática</div>
            </div>
          </div>
        </div>
      </header>

      <!-- CONTENT -->
      <div class="content">
        <!-- HEADER -->
        <div class="provas-header">
          <div>
            <h1>Minhas Turmas</h1>
            <p>
              Gerencie suas turmas e acompanhe o desempenho dos alunos
            </p>
          </div>
        </div>

        <!-- CARDS SUPERIORES -->
        <div class="turmas-stats">
          <div class="turma-stat-card">
            <div class="turma-stat-icon blue">
              <i class="bx bx-group"></i>
            </div>

            <div>
              <h2>4</h2>
              <span>Turmas Ativas</span>
            </div>
          </div>

          <div class="turma-stat-card">
            <div class="turma-stat-icon green">
              <i class="bx bx-book-reader"></i>
            </div>

            <div>
              <h2>115</h2>
              <span>Total de Alunos</span>
            </div>
          </div>

          <div class="turma-stat-card">
            <div class="turma-stat-icon purple">
              <i class="bx bx-bar-chart-alt"></i>
            </div>

            <div>
              <h2>7.5</h2>
              <span>Média Geral</span>
            </div>
          </div>
        </div>

        <!-- GRID DAS TURMAS -->
        <div class="turmas-grid" id="turmasGrid"></div>

      </div>
    </main>
  </div>

  <script src="/Professor/professordesk/javascript.js"></script>
</body>

</html>
