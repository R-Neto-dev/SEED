<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Provas | Professor</title>

    <!-- Boxicons -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
    />

    <!-- Fonte -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="app">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="logo-area">
          <div class="logo-icon">PS</div>

          <div class="logo-text-wrapper">
            <span class="logo-text">Prova Sergipe</span>
            <span class="logo-subtitle">Professor</span>
          </div>
        </div>

        <nav class="nav">
          <a href="index.html" class="nav-item">
            <i class="bx bx-home"></i>
            <span>Dashboard</span>
          </a>

          <a href="provas.html" class="nav-item active">
            <i class="bx bx-book-open"></i>
            <span>Provas</span>
          </a>

          <a href="turmas.html" class="nav-item">
            <i class="bx bx-group"></i>
            <span>Turmas</span>
          </a>

          <a href="banco.html" class="nav-item">
            <i class="bx bx-library"></i>
            <span>Banco de Questões</span>
          </a>

          <a href="resultados.html" class="nav-item">
            <i class="bx bx-line-chart"></i>
            <span>Resultados</span>
          </a>

          <a href="calendario.html" class="nav-item">
            <i class="bx bx-calendar-event"></i>
            <span>Calendário</span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <a href="#" class="nav-item">
            <i class="bx bx-cog"></i>
            <span>Configurações</span>
          </a>

          <a href="#" class="nav-item" id="logout">
            <i class="bx bx-log-out-circle"></i>
            <span>Sair</span>
          </a>
        </div>
      </aside>

      <!-- MAIN -->
      <main class="main">
        <!-- HEADER -->
        <header class="header">
          <div class="header-left">
            <button class="menu-btn" id="menuBtn">
              <i class="bx bx-menu"></i>
            </button>
          </div>

          <div class="header-right">
            <!-- Notificação -->
            <button class="notification-btn">
              <i class="bx bx-bell"></i>
              <span class="notification-badge">2</span>
            </button>

            <!-- Usuário -->
            <div class="user">
              <div class="user-avatar">P</div>

              <div class="user-details">
                <div class="user-name">Paula Santos</div>
                <div class="user-role">Professor</div>
              </div>
            </div>
          </div>
        </header>

        <!-- CONTENT -->
        <div class="content">
          <div class="provas-header">
            <div>
              <h1>Minhas Provas</h1>
              <p>Gerencie suas avaliações</p>
            </div>

            <button class="btn-new-exam">
              <i class="bx bx-plus"></i>
              Nova Prova
            </button>
          </div>

          <!-- FILTROS -->
          <div class="provas-filters">
            <button class="filter-btn active">Todas</button>
            <button class="filter-btn">Ativas</button>
            <button class="filter-btn">Encerradas</button>
            <button class="filter-btn">Rascunhos</button>
          </div>

          <!-- TABELA -->
          <div class="card provas-table-card">
            <table class="provas-table">
              <thead>
                <tr>
                  <th>Prova</th>
                  <th>Turma</th>
                  <th>Data</th>
                  <th>Questões</th>
                  <th>Participação</th>
                  <th>Status</th>
                </tr>
              </thead>

              <tbody id="provasTableBody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script src="javascript.js"></script>
  </body>
</html>
